
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propulse - Plateforme des Jeunes Entrepreneurs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #141414, #5c3494);
            min-height: 100vh;
            color: white;
        }
        header {
            background: rgba(255,255,255,0.05);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,182,193,0.2);
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #db99b3, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        nav a {
            color: #f5e6d3;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
        }
        .hero h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #ff9ec4, #c084fc, #f5e6d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 18px;
            color: #f5e6d3;
            max-width: 600px;
            margin: 0 auto 40px;
        }
        .form-container {
            max-width: 700px;
            margin: 0 auto 60px;
            background: rgba(245,230,211,0.07);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255,158,196,0.2);
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ff9ec4;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(192,132,252,0.3);
            border-radius: 10px;
            color: white;
            font-size: 15px;
        }
        textarea { height: 100px; resize: vertical; }
        .difficultes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .diff-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(192,132,252,0.1);
            padding: 10px;
            border-radius: 8px;
            color: #f5e6d3;
        }
        .diff-item input[type=checkbox] { width: auto; }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #ff9ec4, #c084fc);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        .popup-overlay.active { display: flex; }
        .popup-box {
            background: linear-gradient(135deg, #3b1f6e, #5c3494);
            border: 2px solid #ff9ec4;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .popup-box h3 { font-size: 24px; color: #ff9ec4; margin-bottom: 10px; }
        .popup-box p { color: #f5e6d3; margin-bottom: 25px; }
        .popup-box button { width: auto; padding: 10px 30px; font-size: 16px; }
        @media (max-width: 768px) {
    header {
        padding: 15px 20px;
    }
    .hero {
        padding: 40px 15px 20px;
    }
    .hero h1 {
        font-size: 28px;
    }
    .form-container {
        margin: 0 15px 40px;
        padding: 25px 20px;
    }
    .difficultes {
        grid-template-columns: 1fr;
    }
    button {
        font-size: 16px;
        padding: 14px;
    }
}
    </style>
</head>
<body>
    <header>
        <div class="logo">PROPULSE</div>
        <nav></nav>
    </header>

    <div class="hero">
        <h1>Lance ton projet, on te propulse !</h1>
        <p>Rejoins des milliers de jeunes entrepreneurs et fais connaître ton activité.</p>
    </div>

    <div class="form-container">
        <form id="propulseForm" action="/soumettre" method="POST">
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" name="nom" placeholder="Ton nom" required>
            </div>
            <div class="form-group">
                <label>Âge</label>
                <input type="number" name="age" placeholder="Ton âge" required>
            </div>
            <div class="form-group">
                <label>Pays / Région</label>
                <input type="text" name="pays" placeholder="Ex: Cameroun, Dakar..." required>
            </div>
            <div class="form-group">
                <label>Secteur d'activité</label>
                <select name="secteur" required>
                    <option value="">-- Choisis ton secteur --</option>
                    <option>Commerce</option>
                    <option>Artisanat</option>
                    <option>Restauration</option>
                    <option>Agriculture</option>
                    <option>Mode & Beauté</option>
                    <option>Transport</option>
                    <option>Technologie</option>
                    <option>Autre</option>
                </select>
            </div>
            <div class="form-group">
                <label>Description de ton activité</label>
                <textarea name="activite" placeholder="Décris ce que tu fais..."></textarea>
            </div>
            <div class="form-group">
                <label>Capital de départ (en FCFA)</label>
                <input type="number" name="capital" placeholder="Ex: 50000" required>
            </div>
            <div class="form-group">
                <label>Chiffre d'affaires mensuel (en FCFA)</label>
                <input type="number" name="chiffre_affaires" placeholder="Ex: 150000" required>
            </div>
            <div class="form-group">
                <label>Ancienneté (en mois)</label>
                <input type="number" name="anciennete" placeholder="Ex: 6" required>
            </div>
            <div class="form-group">
                <label>Difficultés rencontrées</label>
                <div class="difficultes">
                    <div class="diff-item">
                        <input type="checkbox" name="diff" value="Financement"> Financement
                    </div>
                    <div class="diff-item">
                        <input type="checkbox" name="diff" value="Clients"> Clients
                    </div>
                    <div class="diff-item">
                        <input type="checkbox" name="diff" value="Visibilité"> Visibilité
                    </div>
                    <div class="diff-item">
                        <input type="checkbox" name="diff" value="Transport/Livraison"> Transport / Livraison
                    </div>
                    <div class="diff-item">
                        <input type="checkbox" name="diff" value="Manque de financement"> Manque de financement
                    </div>
                    <div class="diff-item">
                        <input type="checkbox" name="diff" value="Concurrence"> Concurrence
                    </div>
                </div>
                <input type="text" name="autres_difficultes" placeholder="Autres difficultés..." style="margin-top:10px;">
            </div>
            <button type="submit">Soumettre mon projet</button>
        </form>
    </div>

    <script>
        document.getElementById('propulseForm').addEventListener('submit', function(e) {
            const difficultes = [];
            document.querySelectorAll('input[name=diff]:checked').forEach(cb => {
                difficultes.push(cb.value);
            });
            const autres = document.querySelector('input[name=autres_difficultes]').value;
            if (autres) difficultes.push(autres);
            
            let hidden = document.getElementById('hiddenDiff');
            if (!hidden) {
                hidden = document.createElement('input');
                hidden.type = 'hidden';
                hidden.name = 'difficultes';
                hidden.id = 'hiddenDiff';
                this.appendChild(hidden);
            }
            hidden.value = difficultes.join(', ');
        });
    </script>
</body>
</html>
